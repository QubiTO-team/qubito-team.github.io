- icon: "🤖"
  header: "GenQ Global Hackathon Series a Ginevra"
  badge: "Ottobre 2025"
  description: "Il nostro team ha ottenuto un ottimo risultato al GenQ Hackathon, ospitato da QAI Ventures al CERN, dove abbiamo gareggiato in una serie di entusiasmanti sfide di quantum machine learning. Ci siamo divisi in due gruppi per affrontare due problemi distinti: la classificazione di immagini mediche e la previsione della qualità dell'aria. I nostri sforzi sono stati premiati quando il team dedicato alle immagini mediche si è aggiudicato il Secondo Posto e ha portato a casa il Premio per l'Innovazione."
  isMainActivity: true
